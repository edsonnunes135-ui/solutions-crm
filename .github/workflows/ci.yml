name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Typecheck (server + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências (workspaces)
        run: npm ci

      - name: Gerar Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Typecheck do servidor
        working-directory: apps/server
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck do web
        working-directory: apps/web
        run: npx tsc --noEmit
