services:
  # API (Express + Prisma)
  - type: web
    name: solutions-api
    runtime: node
    plan: free
    rootDir: apps/server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solutions-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: solutions-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_VERIFY_TOKEN
        value: solutions_verify

  # Redis (fila de automações)
  - type: keyvalue
    name: solutions-redis
    plan: free
    ipAllowList: []

  # Frontend (React/Vite estático)
  - type: web
    name: solutions-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: solutions-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: solutions-db
    plan: free
